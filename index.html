<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Where Has Jad Aljersh Been?</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="data/Been_1.js"></script>
        <script src="data/Planned_2.js"></script>
        <script src="data/Roads_3.js"></script>
        <script src="data/Flights_4.js"></script>
        <script src="data/Airports_5.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString') {
              highlightLayer.setStyle({
                color: '#005fb0',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#005fb0',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:true, maxZoom:9, minZoom:2
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
        }
        map.createPane('pane_BasemapPositron_0');
        map.getPane('pane_BasemapPositron_0').style.zIndex = 400;
        var layer_BasemapPositron_0 = L.tileLayer('https://a.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}@2x.png', {
            pane: 'pane_BasemapPositron_0',
            opacity: 1.0,
            attribution: '<a href="https://cartodb.com/basemaps/">Map tiles by CartoDB, under CC BY 3.0. Data by OpenStreetMap, under ODbL.</a>',
            minZoom: 2,
            maxZoom: 9,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_BasemapPositron_0;
        map.addLayer(layer_BasemapPositron_0);
        function pop_Been_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['NAME'] !== null ? autolinker.link(feature.properties['NAME'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_Been_1_0() {
            return {
                pane: 'pane_Been_1',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(34,139,225,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_Been_1');
        map.getPane('pane_Been_1').style.zIndex = 401;
        map.getPane('pane_Been_1').style['mix-blend-mode'] = 'normal';
        var layer_Been_1 = new L.geoJson(json_Been_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Been_1',
            layerName: 'layer_Been_1',
            pane: 'pane_Been_1',
            onEachFeature: pop_Been_1,
            style: style_Been_1_0,
        });
        bounds_group.addLayer(layer_Been_1);
        map.addLayer(layer_Been_1);
        function pop_Planned_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['SOVEREIGNT'] !== null ? autolinker.link(feature.properties['SOVEREIGNT'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_Planned_2_0() {
            return {
                pane: 'pane_Planned_2',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(174,210,255,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_Planned_2');
        map.getPane('pane_Planned_2').style.zIndex = 402;
        map.getPane('pane_Planned_2').style['mix-blend-mode'] = 'normal';
        var layer_Planned_2 = new L.geoJson(json_Planned_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Planned_2',
            layerName: 'layer_Planned_2',
            pane: 'pane_Planned_2',
            onEachFeature: pop_Planned_2,
            style: style_Planned_2_0,
        });
        bounds_group.addLayer(layer_Planned_2);
        map.addLayer(layer_Planned_2);
        function pop_Roads_3(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(feature.properties['fid'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(feature.properties['id'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['start'] !== null ? autolinker.link(feature.properties['start'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['end'] !== null ? autolinker.link(feature.properties['end'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['cost'] !== null ? autolinker.link(feature.properties['cost'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['OBJECTID'] !== null ? autolinker.link(feature.properties['OBJECTID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['path'] !== null ? autolinker.link(feature.properties['path'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_Roads_3_0() {
            return {
                pane: 'pane_Roads_3',
                opacity: 1,
                color: 'rgba(248,219,51,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 1.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_Roads_3');
        map.getPane('pane_Roads_3').style.zIndex = 403;
        map.getPane('pane_Roads_3').style['mix-blend-mode'] = 'normal';
        var layer_Roads_3 = new L.geoJson(json_Roads_3, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Roads_3',
            layerName: 'layer_Roads_3',
            pane: 'pane_Roads_3',
            onEachFeature: pop_Roads_3,
            style: style_Roads_3_0,
        });
        bounds_group.addLayer(layer_Roads_3);
        map.addLayer(layer_Roads_3);
        function pop_Flights_4(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(feature.properties['fid'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['OBJECTID'] !== null ? autolinker.link(feature.properties['OBJECTID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['layer'] !== null ? autolinker.link(feature.properties['layer'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['path'] !== null ? autolinker.link(feature.properties['path'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(feature.properties['id'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_Flights_4_0() {
            return {
                pane: 'pane_Flights_4',
                opacity: 1,
                color: 'rgba(85,85,85,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 2.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_Flights_4');
        map.getPane('pane_Flights_4').style.zIndex = 404;
        map.getPane('pane_Flights_4').style['mix-blend-mode'] = 'normal';
        var layer_Flights_4 = new L.geoJson(json_Flights_4, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Flights_4',
            layerName: 'layer_Flights_4',
            pane: 'pane_Flights_4',
            onEachFeature: pop_Flights_4,
            style: style_Flights_4_0,
        });
        bounds_group.addLayer(layer_Flights_4);
        map.addLayer(layer_Flights_4);
        function pop_Airports_5(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Name</th>\
                        <td>' + (feature.properties['Name'] !== null ? autolinker.link(feature.properties['Name'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">IATA Code</th>\
                        <td>' + (feature.properties['IATA Code'] !== null ? autolinker.link(feature.properties['IATA Code'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">City</th>\
                        <td>' + (feature.properties['City'] !== null ? autolinker.link(feature.properties['City'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Number of Departures and Arrivals</th>\
                        <td>' + (feature.properties['Number of Departures and Arrivals'] !== null ? autolinker.link(feature.properties['Number of Departures and Arrivals'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_Airports_5_0() {
            return {
                pane: 'pane_Airports_5',
        rotationAngle: 0.0,
        rotationOrigin: 'center center',
        icon: L.icon({
            iconUrl: 'markers/Airports_5.svg',
            iconSize: [11.399999999999999, 11.399999999999999]
        }),
                interactive: true,
            }
        }
        function style_Airports_5_1() {
            return {
                pane: 'pane_Airports_5',
        rotationAngle: 0.0,
        rotationOrigin: 'center center',
        icon: L.icon({
            iconUrl: 'markers/Airports_5.svg',
            iconSize: [11.399999999999999, 11.399999999999999]
        }),
                interactive: true,
            }
        }
        map.createPane('pane_Airports_5');
        map.getPane('pane_Airports_5').style.zIndex = 405;
        map.getPane('pane_Airports_5').style['mix-blend-mode'] = 'normal';
        var layer_Airports_5 = new L.geoJson.multiStyle(json_Airports_5, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Airports_5',
            layerName: 'layer_Airports_5',
            pane: 'pane_Airports_5',
            onEachFeature: pop_Airports_5,
            pointToLayers: [function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_Airports_5_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_Airports_5_1(feature));
            },
        ]});
        bounds_group.addLayer(layer_Airports_5);
        map.addLayer(layer_Airports_5);
            var title = new L.Control();
            title.onAdd = function (map) {
                this._div = L.DomUtil.create('div', 'info');
                this.update();
                return this._div;
            };
            title.update = function () {
                this._div.innerHTML = '<h2>Where Has Jad Aljersh Been?</h2>';
            };
            title.addTo(map);
            var abstract = new L.Control({'position':'topleft'});
            abstract.onAdd = function (map) {
                this._div = L.DomUtil.create('div',
                'leaflet-control abstract');
                this._div.id = 'abstract'
                    this._div.setAttribute("onmouseenter", "abstract.show()");
                    this._div.setAttribute("onmouseleave", "abstract.hide()");
                    this.hide();
                    return this._div;
                };
                abstract.hide = function () {
                    this._div.classList.remove("abstractUncollapsed");
                    this._div.classList.add("abstract");
                    this._div.innerHTML = 'i'
                }
                abstract.show = function () {
                    this._div.classList.remove("abstract");
                    this._div.classList.add("abstractUncollapsed");
                    this._div.innerHTML = 'This GitHub-hosted web map was created using QGIS and exported using the "web2gis" plugin. Displayed are the U.S. states and countries he has visited, the flight paths he has taken, the airports he has flown out of and into, and the major road trips he has been on. Click on the airport symbol or any state or country to identify them. The boundaries, airports, and the global road network were obtained from ESRI. ';
            };
            abstract.addTo(map);
        var baseMaps = {};
        L.control.layers(baseMaps,{'<img src="legend/Airports_5.png" /> Airports': layer_Airports_5,'<img src="legend/Flights_4.png" /> Flights': layer_Flights_4,'<img src="legend/Roads_3.png" /> Roads': layer_Roads_3,'<img src="legend/Planned_2.png" /> Planned': layer_Planned_2,'<img src="legend/Been_1.png" /> Been': layer_Been_1,"Basemap (Positron)": layer_BasemapPositron_0,}).addTo(map);
        setBounds();
        </script>
    </body>
</html>
